version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: projectmatchai-db
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectmatchai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: projectmatchai-ollama
    environment:
      # Keep the model resident in RAM between matches (plenty of free RAM),
      # avoiding a multi-second reload on each cold call.
      OLLAMA_KEEP_ALIVE: "-1"
      # Serve one request at a time so each gets the full CPU and finishes
      # fast, instead of splitting cores across parallel requests (which on
      # CPU makes every concurrent call crawl and blow the client timeout).
      OLLAMA_NUM_PARALLEL: "1"
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama

  backend:
    build:
      context: ./backend
    container_name: projectmatchai-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/projectmatchai
      OLLAMA_BASE_URL: http://ollama:11434
      EXTRA_CORS_ORIGINS: ${EXTRA_CORS_ORIGINS:-}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: projectmatchai-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: projectmatchai-net
    driver: bridge
    ipam:
      config:
        - subnet: 10.77.0.0/16

volumes:
  pgdata:
  ollama:
